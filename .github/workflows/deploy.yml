name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main ]

env:
  REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
  IMAGE_NAME: exam-web-app
  VM_USER: ${{ secrets.VM_USER }}
  VM_HOST: ${{ secrets.VM_HOST }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY_JSON }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.YC_SA_KEY_JSON }}" > /tmp/sa-key.json
            docker login cr.yandex --username json_key --password-stdin < /tmp/sa-key.json
            docker pull cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
            docker stop exam-app || true
            docker rm exam-app || true
            docker run -d --name exam-app -p 80:80 --restart unless-stopped \
              cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
            rm /tmp/sa-key.json
